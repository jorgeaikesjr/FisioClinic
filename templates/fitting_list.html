{% extends "base.html" %}

{% block title %}Lista de Encaixe{% endblock %}
{% block header_title %}Lista de Encaixe{% endblock %}

{% block content %}
<div class="card">
    <h3>Adicionar Paciente para Encaixe</h3>
    <div class="d-flex align-center" style="gap: 15px; margin-top: 15px; flex-wrap: wrap;">
        <div class="form-group mb-0" style="flex: 1; min-width: 250px;">
            <select id="selectPatient" class="form-control">
                <option value="">Selecione um paciente...</option>
                <!-- Preenchido via JS -->
            </select>
        </div>
        <button class="btn btn-primary" onclick="addToFittingList()">
            <i class="fa-solid fa-plus"></i> Adicionar à Lista
        </button>
    </div>
</div>

<div class="card" style="margin-top: 25px;">
    <div class="d-flex justify-between align-center">
        <h3>Pacientes na Fila</h3>
        <span class="badge badge-gray" id="countBadge">0 pacientes</span>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Contato</th>
                    <th>Data Adição</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="fitting-list-body">
                <!-- Preenchido via JS -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/fitting_list.js?v=1.0"></script>
{% endblock %}
