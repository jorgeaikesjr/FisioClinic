<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Senha - FisioClinic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--background);
            margin: 0;
            padding: 1rem;
        }
        
        .login-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .login-header i {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: block;
            color: #f59e0b;
        }
        
        .login-form .form-group {
            margin-bottom: 1.5rem;
        }
        
        .login-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }
        
        .login-form input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 1rem;
            background-color: var(--background);
            color: var(--text-color);
        }
        
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }
        
        .btn-login:hover {
            background-color: var(--secondary);
        }
        
        .error-message, .success-message {
            text-align: center;
            margin-top: 1rem;
            display: none;
            font-size: 0.9rem;
        }
        .error-message { color: #ef4444; }
        .success-message { color: #10b981; }
        
        .info-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <i class="fa-solid fa-lock"></i>
            Segurança
        </div>
        <p class="info-text">Como este é o seu primeiro acesso (ou sua senha foi resetada), você precisa definir uma nova senha segura para continuar.</p>
        
        <form id="changePasswordForm" class="login-form">
            <div class="form-group">
                <label for="oldPassword">Senha Atual Temporária</label>
                <input type="password" id="oldPassword" required>
            </div>
            <div class="form-group">
                <label for="newPassword">Nova Senha</label>
                <input type="password" id="newPassword" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirme a Nova Senha</label>
                <input type="password" id="confirmPassword" required minlength="6">
            </div>
            
            <button type="submit" class="btn-login" id="submitBtn">Atualizar Senha</button>
            <div id="errorMessage" class="error-message">Erro ao atualizar a senha.</div>
            <div id="successMessage" class="success-message">Senha atualizada com sucesso! Redirecionando...</div>
        </form>
    </div>

    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if(newPassword !== confirmPassword) {
                errorMsg.textContent = 'As novas senhas não coincidem.';
                errorMsg.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Aguarde...';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            try {
                const response = await fetch('/api/v1/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
                });
                
                if (response.ok) {
                    successMsg.style.display = 'block';
                    setTimeout(() => { window.location.href = '/'; }, 1500);
                } else {
                    const data = await response.json();
                    errorMsg.textContent = data.detail || 'Senha atual incorreta ou erro.';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Atualizar Senha';
                }
            } catch (error) {
                errorMsg.textContent = 'Erro de conexão. Tente novamente.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Atualizar Senha';
            }
        });
    </script>
</body>
</html>
