{% extends "base.html" %}

{% block title %}Relatório de Faltas{% endblock %}
{% block header_title %}Controle de Faltas dos Pacientes{% endblock %}

{% block content %}
<div class="card">
    <div class="d-flex justify-between align-center mb-4 flex-wrap" style="gap: 15px;">
        <h3>Filtro de Período</h3>
        <div class="d-flex align-center" style="gap: 15px;">
            <div class="form-group mb-0">
                <select id="filterType" class="form-control" onchange="toggleFilterInputs()">
                    <option value="week">Por Semana</option>
                    <option value="month">Por Mês</option>
                    <option value="year">Por Ano</option>
                    <option value="custom">Período Específico</option>
                    <option value="total">Total (Histórico)</option>
                </select>
            </div>
            
            <div class="form-group mb-0" id="weekInputGroup">
                <input type="week" id="filterWeek" class="form-control">
            </div>
            
            <div class="form-group mb-0" id="monthInputGroup" style="display: none;">
                <input type="month" id="filterMonth" class="form-control">
            </div>
            
            <div class="form-group mb-0" id="yearInputGroup" style="display: none;">
                <input type="number" id="filterYear" class="form-control" min="2020" max="2100" step="1">
            </div>
            
            <div class="form-group mb-0" id="customInputGroup" style="display: none;">
                <div class="d-flex" style="gap: 5px;">
                    <input type="date" id="filterStartDate" class="form-control" title="Data Inicial">
                    <input type="date" id="filterEndDate" class="form-control" title="Data Final">
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="applyFilter()">
                <i class="fa-solid fa-filter"></i> Filtrar
            </button>
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="cursor: pointer;" onclick="sortTable('patient_name')">Paciente <i class="fa-solid fa-sort" style="font-size: 0.8em; opacity: 0.5;"></i></th>
                    <th style="cursor: pointer;" onclick="sortTable('patient_contact')">Contato <i class="fa-solid fa-sort" style="font-size: 0.8em; opacity: 0.5;"></i></th>
                    <th style="cursor: pointer;" onclick="sortTable('absences_count')" title="Total de Faltas (Justificadas + Não Justificadas)">Total <i class="fa-solid fa-sort" style="font-size: 0.8em; opacity: 0.5;"></i></th>
                    <th style="cursor: pointer;" onclick="sortTable('unjustified_absences')">Não Justificadas <i class="fa-solid fa-sort" style="font-size: 0.8em; opacity: 0.5;"></i></th>
                    <th style="cursor: pointer;" onclick="sortTable('justified_absences')">Justificadas <i class="fa-solid fa-sort" style="font-size: 0.8em; opacity: 0.5;"></i></th>
                </tr>
            </thead>
            <tbody id="reports-table-body">
                <!-- Carregado via JS -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/reports_absences.js?v=1.1"></script>
{% endblock %}
