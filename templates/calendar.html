{% extends "base.html" %}

{% block title %}Calendário{% endblock %}
{% block header_title %}Agendamentos{% endblock %}

{% block head %}
<!-- FullCalendar via CDN -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales/pt-br.global.min.js"></script>
<style>
    /* Ajustes específicos do FullCalendar para encaixar no nosso CSS premium */
    .fc {
        background-color: var(--surface);
        padding: 20px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        font-family: 'Inter', sans-serif;
    }
    .fc-theme-standard th { border-color: var(--border); padding: 10px 0; background: var(--background); }
    .fc-theme-standard td { border-color: var(--border); }
    .fc-button-primary {
        background-color: var(--primary) !important;
        border-color: var(--primary) !important;
        text-transform: capitalize;
    }
    .fc-button-primary:hover { background-color: var(--primary-hover) !important; }
    .fc-event {
        cursor: pointer;
        border: none;
        border-radius: 4px;
        padding: 2px 4px;
        font-size: 0.85em;
    }
    /* Cores de Eventos (Customizadas no JS) */
    .event-agendado { background-color: var(--primary); color: white; }
    .event-cancelado { background-color: var(--secondary); color: white; opacity: 0.7; }
    .event-realizado { background-color: var(--success); color: white; }
    .event-faltou { background-color: #e53e3e; color: white; }
    .event-falta-justificada { background-color: #f6ad55; color: white; }
</style>
{% endblock %}

{% block content %}
<div id="calendar"></div>

<!-- Modal Agendamento -->
<div class="modal-overlay" id="appointmentModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Novo Agendamento</h3>
            <i class="fa-solid fa-xmark modal-close" onclick="closeModal('appointmentModal')"></i>
        </div>
        <form id="appointmentForm" onsubmit="saveAppointment(event)">
            <div class="modal-body">
                <input type="hidden" id="appointmentId">
                
                <div class="form-group">
                    <label>Paciente *</label>
                    <select id="selectPatient" class="form-control" required>
                        <option value="">Selecione...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>{% if request.app.state.settings.CLINIC_TYPE == 'particular' %}Profissional{% else %}Estagiário{% endif %} *</label>
                    <select id="selectIntern" class="form-control" required>
                        <option value="">Selecione um {% if request.app.state.settings.CLINIC_TYPE == 'particular' %}profissional{% else %}estagiário{% endif %}...</option>
                    </select>
                </div>

                <div class="form-group" id="categoryGroup">
                    <label>Categoria</label>
                    <select id="appointmentCategory" class="form-control">
                        <option value="">Selecione uma categoria...</option>
                        <option value="Neuro Adulto">Neuro Adulto</option>
                        <option value="Neuro Infantil">Neuro Infantil</option>
                        <option value="Ortopedia">Ortopedia</option>
                        <option value="Cardio">Cardio</option>
                        <option value="Saúde Coletiva">Saúde Coletiva</option>
                    </select>
                </div>
                
                <div class="form-group d-flex" style="gap: 15px;">
                    <div style="flex: 1;">
                        <label>Início *</label>
                        <input type="datetime-local" id="startTime" class="form-control" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Término *</label>
                        <input type="datetime-local" id="endTime" class="form-control" required>
                    </div>
                </div>
                <div class="form-group" id="recurrenceToggleGroup">
                    <label style="cursor: pointer; font-weight: 600;">
                        <input type="checkbox" id="isRecurring" onchange="toggleRecurrence()">
                        Agendamento Recorrente
                    </label>
                </div>

                <div id="recurrenceBlock" style="display: none; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px;">
                    <div class="form-group">
                        <label>Dias da Semana</label>
                        <div class="d-flex" style="gap: 15px; flex-wrap: wrap;">
                            <label><input type="checkbox" name="recurDays" value="0"> Seg</label>
                            <label><input type="checkbox" name="recurDays" value="1"> Ter</label>
                            <label><input type="checkbox" name="recurDays" value="2"> Qua</label>
                            <label><input type="checkbox" name="recurDays" value="3"> Qui</label>
                            <label><input type="checkbox" name="recurDays" value="4"> Sex</label>
                            <label><input type="checkbox" name="recurDays" value="5"> Sáb</label>
                            <label><input type="checkbox" name="recurDays" value="6"> Dom</label>
                        </div>
                    </div>
                    <div class="form-group mb-0">
                        <label>Repetir por quantas semanas?</label>
                        <input type="number" id="recurWeeks" class="form-control" min="1" max="52" value="4" style="width: 100px;">
                    </div>
                </div>
                
                <div class="form-group" id="statusGroup">
                    <label>Status</label>
                    <select id="appointmentStatus" class="form-control">
                        <option value="Agendado">Agendado</option>
                        <option value="Realizado">Realizado</option>
                        <option value="Faltou">Faltou</option>
                        <option value="Falta Justificada">Falta Justificada</option>
                    </select>
                </div>

                <!-- Bloco de Pagamento: visível apenas em Clínica Particular (controlado via .env) -->
                <div id="paymentBlock" style="display: none;">
                    <div class="form-group d-flex" style="gap: 15px;">
                        <div style="flex: 1;">
                            <label>Forma de Pagamento</label>
                            <select id="paymentMethod" class="form-control">
                                <option value="">Sem pagamento / Não informado</option>
                                <option value="Pix">Pix</option>
                                <option value="Dinheiro">Dinheiro</option>
                                <option value="Cartão de Crédito">Cartão de Crédito</option>
                                <option value="Cartão de Débito">Cartão de Débito</option>
                                <option value="Transferência">Transferência</option>
                            </select>
                        </div>
                        <div style="flex: 1;">
                            <label>Valor Pago (R$)</label>
                            <input type="number" id="amountPaid" class="form-control" min="0" step="0.01" placeholder="0,00">
                        </div>
                    </div>
                </div>

                <!-- Área de cancelamento (Apenas se for editar) -->
                <div id="cancelArea" class="mt-4" style="display:none; padding-top: 15px; border-top: 1px dashed var(--border);">
                    <button type="button" class="btn btn-danger" style="width:100%" onclick="cancelAppointment()">
                        <i class="fa-solid fa-ban"></i> Cancelar Agendamento
                    </button>
                </div>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('appointmentModal')">Fechar</button>
                <button type="submit" class="btn btn-primary">Salvar Agendamento</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/calendar.js"></script>
{% endblock %}
