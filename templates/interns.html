{% extends "base.html" %}

{% block title %}Estagiários{% endblock %}
{% block header_title %}Gestão de Estagiários{% endblock %}

{% block content %}
<div class="card">
    <div class="d-flex justify-between align-center">
        <h3>Lista de Estagiários</h3>
        <button class="btn btn-primary" onclick="openInternModal()">
            <i class="fa-solid fa-plus"></i> Novo Estagiário
        </button>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="interns-table-body">
                <!-- Carregado via JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Estagiário -->
<div class="modal-overlay" id="internModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Novo Estagiário</h3>
            <i class="fa-solid fa-xmark modal-close" onclick="closeModal('internModal')"></i>
        </div>
        <form id="internForm" onsubmit="saveIntern(event)">
            <div class="modal-body">
                <input type="hidden" id="internId">
                <div class="form-group">
                    <label>Nome Completo *</label>
                    <input type="text" id="internName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="internActive" checked>
                        Ativo para Agendamentos
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('internModal')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar Estagiário</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/interns.js"></script>
{% endblock %}
